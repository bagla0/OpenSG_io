<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="OpenSG_io">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e40af"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="62" height="62" rx="15" fill="url(#bg)"/>
  <!-- airfoil cross-section: rounded leading edge (left), tapered trailing edge (right) -->
  <path d="M11 33 C 22 21, 45 23, 55 31 C 45 39, 22 45, 11 33 Z" fill="#ffffff" opacity="0.96"/>
  <!-- two shear webs -->
  <line x1="25" y1="26.5" x2="25" y2="39" stroke="#1e40af" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="36" y1="25.5" x2="36" y2="40" stroke="#1e40af" stroke-width="2.4" stroke-linecap="round"/>
  <!-- spar caps -->
  <path d="M21 25.5 C 28 23.6, 40 24, 47 27.5" stroke="#0e7490" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M21 40 C 28 42.4, 40 42, 47 36.5" stroke="#0e7490" stroke-width="2.2" fill="none" stroke-linecap="round"/>
</svg>
